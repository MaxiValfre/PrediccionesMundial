<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Analytics Terminal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d10;--panel:#14161b;--card:#1a1d24;--border:#2a2d35;
  --text:#e8eaed;--text2:#8b8f98;--muted:#555961;
  --green:#00c853;--red:#ff1744;--blue:#2979ff;--gold:#ffd600;--cyan:#00e5ff;
  --yellow:#ffab00;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono',monospace;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html{font-size:14px;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{min-height:100vh;overflow-x:hidden}
a{color:var(--cyan);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header .logo{font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--gold);letter-spacing:1px}
.header .logo span{color:var(--text2);font-weight:400;font-size:.75rem;margin-left:6px}
.header .meta{margin-left:auto;font-family:var(--mono);font-size:.75rem;color:var(--text2)}
.header .meta .val{color:var(--cyan)}

/* TICKER */
.ticker-wrap{background:var(--bg);border-bottom:1px solid var(--border);overflow:hidden;height:32px;position:relative}
.ticker{display:flex;align-items:center;height:100%;animation:tickerScroll 30s linear infinite;white-space:nowrap;position:absolute}
.ticker:hover{animation-play-state:paused}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-family:var(--mono);font-size:.75rem;color:var(--text2);border-right:1px solid var(--border)}
.ticker-item .teams{color:var(--text)}
.ticker-item .prob{padding:1px 4px;border-radius:2px;font-size:.7rem}
.ticker-item .prob.high{background:rgba(0,200,83,.15);color:var(--green)}
.ticker-item .prob.med{background:rgba(255,171,0,.15);color:var(--yellow)}
.ticker-item .prob.low{background:rgba(255,23,68,.15);color:var(--red)}

/* TABS */
.tab-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{padding:8px 20px;font-family:var(--mono);font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN */
.main{padding:12px;max-width:1600px;margin:0 auto}
.tab-content{display:none;animation:fadeIn .15s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* PANEL / CARD */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.panel-title{font-family:var(--mono);font-size:.7rem;font-weight:600;color:var(--text2);padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.panel-title .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.panel-body{padding:10px}

.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:10px}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;flex-direction:column;gap:8px}
.match-card .mc-header{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--text2);font-family:var(--mono)}
.match-card .mc-header .group-tag{background:var(--panel);padding:2px 6px;border-radius:2px;color:var(--cyan)}
.match-card .mc-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;text-align:center}
.match-card .mc-team{display:flex;flex-direction:column;align-items:center;gap:2px}
.match-card .mc-team .flag{font-size:1.6rem}
.match-card .mc-team .name{font-size:.8rem;font-weight:600;color:var(--text)}
.match-card .mc-team .rating{font-family:var(--mono);font-size:.65rem;color:var(--muted)}
.match-card .mc-score{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--gold);letter-spacing:2px;display:flex;align-items:center;gap:4px}
.match-card .mc-score .sep{color:var(--muted);font-size:1.2rem}

/* PROB BAR */
.prob-bar{display:flex;height:20px;border-radius:2px;overflow:hidden;font-family:var(--mono);font-size:.65rem;font-weight:600}
.prob-bar .seg{display:flex;align-items:center;justify-content:center;transition:width .8s ease-out;color:#fff;min-width:0}
.prob-bar .seg.win{background:var(--green)}
.prob-bar .seg.draw{background:var(--yellow);color:#000}
.prob-bar .seg.lose{background:var(--red)}

/* ODDS ROW */
.odds-row{display:flex;justify-content:center;gap:6px;font-family:var(--mono);font-size:.75rem}
.odds-row .odd{background:var(--panel);padding:2px 8px;border-radius:2px;color:var(--text)}
.odds-row .odd.fav{color:var(--green);border:1px solid rgba(0,200,83,.3)}

/* XG BAR */
.xg-bar{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.65rem;height:14px}
.xg-bar .xg-val{color:var(--text2);min-width:30px;text-align:center}
.xg-bar .xg-track{flex:1;height:8px;background:var(--bg);border-radius:2px;position:relative;overflow:hidden;display:flex}
.xg-bar .xg-fill-a{background:var(--blue);height:100%;transition:width .8s ease-out}
.xg-bar .xg-fill-b{background:var(--red);height:100%;transition:width .8s ease-out}

/* HEATMAP */
.heatmap{display:inline-grid;gap:1px;font-family:var(--mono);font-size:.55rem}
.heatmap .hm-cell{width:28px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:1px;color:rgba(255,255,255,.8)}
.heatmap .hm-label{display:flex;align-items:center;justify-content:center;color:var(--text2);font-weight:600;background:transparent!important}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:.75rem}
.data-table th{font-family:var(--mono);font-size:.65rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.data-table th:hover{color:var(--cyan)}
.data-table th.sort-asc::after{content:' ▲';color:var(--cyan)}
.data-table th.sort-desc::after{content:' ▼';color:var(--cyan)}
.data-table td{padding:5px 8px;border-bottom:1px solid rgba(42,45,53,.5);font-family:var(--mono);white-space:nowrap}
.data-table tr:hover td{background:rgba(41,121,255,.05)}
.data-table .team-cell{display:flex;align-items:center;gap:6px;font-family:var(--sans);font-weight:600}
.data-table .team-cell .flag{font-size:1rem}
.data-table .mini-bar{display:inline-block;height:10px;background:linear-gradient(90deg,var(--gold),#ff6d00);border-radius:1px;vertical-align:middle;transition:width .8s ease-out}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
.kpi .kpi-val{font-family:var(--mono);font-size:1.8rem;font-weight:700;color:var(--gold)}
.kpi .kpi-label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* GROUP CARD */
.group-card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.group-card .gc-title{font-family:var(--mono);font-size:.7rem;font-weight:700;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--cyan);text-transform:uppercase;letter-spacing:1px;background:var(--panel)}
.group-card table{width:100%;border-collapse:collapse;font-size:.7rem}
.group-card th{font-family:var(--mono);font-size:.6rem;color:var(--muted);padding:4px 4px;text-align:center;border-bottom:1px solid var(--border)}
.group-card th:first-child{text-align:left;padding-left:8px}
.group-card td{padding:3px 4px;text-align:center;border-bottom:1px solid rgba(42,45,53,.3);font-family:var(--mono)}
.group-card td:first-child{text-align:left;padding-left:8px;font-family:var(--sans);font-weight:600}
.group-card .q-bar{height:6px;border-radius:1px;transition:width .8s ease-out}
.group-card .q-cell{min-width:60px}

/* BRACKET */
.bracket{overflow-x:auto;padding:16px 0}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;min-width:200px}
.bracket-matchup{background:var(--card);border:1px solid var(--border);border-radius:4px;margin:4px 0;padding:6px 8px;font-size:.75rem}
.bracket-matchup .bm-team{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-family:var(--mono)}
.bracket-matchup .bm-team.winner{color:var(--gold);font-weight:700}
.bracket-matchup .bm-team .prob{color:var(--text2);font-size:.65rem}
.bracket-connector{min-width:24px;display:flex;flex-direction:column;justify-content:space-around}

/* SCHEDULE */
.schedule-list{max-height:600px;overflow-y:auto}
.schedule-item{display:grid;grid-template-columns:80px 1fr 60px 1fr 80px;align-items:center;padding:6px 10px;border-bottom:1px solid rgba(42,45,53,.3);font-size:.75rem;gap:4px}
.schedule-item.played{opacity:.5}
.schedule-item.live{border-left:2px solid var(--red);background:rgba(255,23,68,.05)}
.schedule-item.today{border-left:2px solid var(--gold);background:rgba(255,214,0,.03)}
.schedule-item .si-date{font-family:var(--mono);font-size:.65rem;color:var(--text2)}
.schedule-item .si-team{font-weight:600}
.schedule-item .si-team.right{text-align:right}
.schedule-item .si-score{font-family:var(--mono);font-weight:700;text-align:center;color:var(--gold)}
.schedule-item .si-group{font-family:var(--mono);font-size:.6rem;color:var(--cyan);text-align:right}

/* MODEL INFO */
.model-info{font-size:.75rem;color:var(--text2)}
.model-info dt{color:var(--text);font-weight:600;margin-top:6px}
.model-info dd{margin-left:12px;font-family:var(--mono);font-size:.7rem}

/* UPCOMING SECTION */
.upcoming-row{display:grid;grid-template-columns:70px 1fr auto 1fr 60px;align-items:center;padding:5px 8px;border-bottom:1px solid rgba(42,45,53,.3);font-size:.75rem;gap:4px}
.upcoming-row .ur-date{font-family:var(--mono);font-size:.65rem;color:var(--text2)}
.upcoming-row .ur-team{font-weight:600}
.upcoming-row .ur-team.right{text-align:right}
.upcoming-row .ur-vs{color:var(--muted);font-family:var(--mono);font-size:.65rem;text-align:center}
.upcoming-row .ur-group{font-family:var(--mono);font-size:.6rem;color:var(--cyan);text-align:right}

/* Canvas */
canvas{display:block;width:100%;background:transparent}

/* Responsive */
@media(max-width:768px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .header{flex-wrap:wrap;gap:8px}
  .main{padding:8px}
  .match-card .mc-score{font-size:1.4rem}
  .tab-btn{padding:6px 12px;font-size:.65rem}
  .bracket-round{min-width:160px}
  .schedule-item{grid-template-columns:60px 1fr 50px 1fr 50px;font-size:.65rem}
}
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="logo">WC2026<span>TERMINAL</span></div>
  <div class="meta" id="header-meta"></div>

<script>
/* ===================================================================
   DATA LOADING
   =================================================================== */
let DATA = null;

async function loadData() {
  if (EMBEDDED_PREDICTIONS) {
    DATA = EMBEDDED_PREDICTIONS;
    return init();
  }
  try {
    const resp = await fetch('predictions.json');
    DATA = await resp.json();
    init();
  } catch (e) {
    document.querySelector('.main').innerHTML = '<div class="panel" style="margin:40px auto;max-width:500px"><div class="panel-title">ERROR</div><div class="panel-body" style="color:var(--red)">Could not load predictions.json. Place the file alongside index.html or run via the Python runner.</div></div>';
  }
}

function getFlag(team) {
  return (DATA && DATA.flags && DATA.flags[team]) || '';
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function pct0(v) { return (v * 100).toFixed(0) + '%'; }
function dec(v) { return v.toFixed(2); }
function getMatchStatusText(m) {
  if (m.status === 'in_progress') return `LIVE ${m.live_minute != null ? m.live_minute + "'" : ''}`.trim();
  if (m.status === 'played') return 'FT';
  return 'SCHED';
}
function getMatchStatusColor(m) {
  if (m.status === 'in_progress') return 'var(--red)';
  if (m.status === 'played') return 'var(--green)';
  return 'var(--cyan)';
}
function getDisplayScore(m) {
  if (m.status === 'scheduled') return [m.predicted_score_a, m.predicted_score_b];
  return [m.actual_score_a, m.actual_score_b];
}

/* ===================================================================
   CANVAS CHART UTILITIES
   =================================================================== */
const CHART_COLORS = ['#2979ff','#00c853','#ff1744','#ffd600','#00e5ff','#e040fb','#ff6d00','#76ff03','#f50057','#00bfa5','#aa00ff','#64dd17'];

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: rect.height };
}

/* --- LINE CHART --- */
function drawLineChart(canvas, datasets, options) {
  const { ctx, w, h } = setupCanvas(canvas);
  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const labels = options.labels || [];
  const yMin = options.yMin != null ? options.yMin : 0;
  const yMax = options.yMax != null ? options.yMax : Math.max(...datasets.flatMap(d => d.values)) * 1.1;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(42,45,53,.6)';
  ctx.lineWidth = 0.5;
  const ySteps = 5;
  for (let i = 0; i <= ySteps; i++) {
    const y = pad.top + ch - (i / ySteps) * ch;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    ctx.fillStyle = '#555961'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    const val = yMin + (i / ySteps) * (yMax - yMin);
    ctx.fillText(pct0(val), pad.left - 6, y + 3);
  }

  // X labels
  ctx.fillStyle = '#555961'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  labels.forEach((lbl, i) => {
    const x = pad.left + (i / Math.max(labels.length - 1, 1)) * cw;
    ctx.fillText(lbl, x, h - pad.bottom + 16);
  });

  // Animate
  let progress = 0;
  const duration = 800;
  const startTime = performance.now();

  function frame(now) {
    progress = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    ctx.clearRect(pad.left, pad.top - 2, cw + 2, ch + 4);

    // Redraw grid
    ctx.strokeStyle = 'rgba(42,45,53,.6)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= ySteps; i++) {
      const y = pad.top + ch - (i / ySteps) * ch;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    }

    datasets.forEach((ds, di) => {
      const color = ds.color || CHART_COLORS[di % CHART_COLORS.length];
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      const pts = ds.values;
      const maxIdx = Math.floor(ease * (pts.length - 1));
      for (let i = 0; i <= maxIdx; i++) {
        const x = pad.left + (i / Math.max(pts.length - 1, 1)) * cw;
        const y = pad.top + ch - ((pts[i] - yMin) / (yMax - yMin)) * ch;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      // Partial last segment
      if (ease < 1 && maxIdx < pts.length - 1) {
        const frac = ease * (pts.length - 1) - maxIdx;
        const x0 = pad.left + (maxIdx / Math.max(pts.length - 1, 1)) * cw;
        const y0 = pad.top + ch - ((pts[maxIdx] - yMin) / (yMax - yMin)) * ch;
        const x1 = pad.left + ((maxIdx + 1) / Math.max(pts.length - 1, 1)) * cw;
        const y1 = pad.top + ch - ((pts[maxIdx + 1] - yMin) / (yMax - yMin)) * ch;
        ctx.lineTo(x0 + (x1 - x0) * frac, y0 + (y1 - y0) * frac);
      }
      ctx.stroke();

      // Dots
      for (let i = 0; i <= maxIdx; i++) {
        const x = pad.left + (i / Math.max(pts.length - 1, 1)) * cw;
        const y = pad.top + ch - ((pts[i] - yMin) / (yMax - yMin)) * ch;
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
      }
    });

    if (progress < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* --- HORIZONTAL BAR CHART --- */
function drawHBarChart(canvas, items, options) {
  const { ctx, w, h } = setupCanvas(canvas);
  const pad = { top: 10, right: 50, bottom: 10, left: options.labelWidth || 100 };
  const barH = Math.min(20, (h - pad.top - pad.bottom) / items.length - 2);
  const maxVal = options.maxVal || Math.max(...items.map(d => d.value));

  ctx.clearRect(0, 0, w, h);

  let progress = 0;
  const duration = 800;
  const startTime = performance.now();

  function frame(now) {
    progress = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    ctx.clearRect(0, 0, w, h);

    items.forEach((item, i) => {
      const y = pad.top + i * (barH + 3);
      // Label
      ctx.fillStyle = '#8b8f98';
      ctx.font = '11px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      const flag = item.flag || '';
      ctx.fillText(flag + ' ' + item.label, pad.left - 6, y + barH / 2);

      // Bar
      const bw = ((item.value / maxVal) * (w - pad.left - pad.right)) * ease;
      const grad = ctx.createLinearGradient(pad.left, 0, pad.left + bw, 0);
      const color = item.color || options.barColor || '#ffd600';
      grad.addColorStop(0, color);
      grad.addColorStop(1, color + '88');
      ctx.fillStyle = grad;
      ctx.fillRect(pad.left, y, bw, barH);

      // Value
      ctx.fillStyle = '#e8eaed';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(options.format ? options.format(item.value) : pct(item.value), pad.left + bw + 4, y + barH / 2);
    });

    if (progress < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* --- DONUT CHART --- */
function drawDonutChart(canvas, slices, options) {
  const { ctx, w, h } = setupCanvas(canvas);
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(w, h) / 2 - 20;
  const inner = r * 0.6;
  const total = slices.reduce((s, d) => s + d.value, 0);

  let progress = 0;
  const duration = 800;
  const startTime = performance.now();

  function frame(now) {
    progress = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    ctx.clearRect(0, 0, w, h);
    let angle = -Math.PI / 2;
    slices.forEach((s, i) => {
      const sweep = (s.value / total) * Math.PI * 2 * ease;
      ctx.beginPath();
      ctx.moveTo(cx + inner * Math.cos(angle), cy + inner * Math.sin(angle));
      ctx.arc(cx, cy, r, angle, angle + sweep);
      ctx.arc(cx, cy, inner, angle + sweep, angle, true);
      ctx.closePath();
      ctx.fillStyle = s.color || CHART_COLORS[i % CHART_COLORS.length];
      ctx.fill();
      angle += sweep;
    });

    // Center text
    if (options.centerText) {
      ctx.fillStyle = '#e8eaed';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(options.centerText, cx, cy);
    }

    if (progress < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* --- HEATMAP (score matrix) --- */
function drawHeatmapHTML(matrix) {
  if (!matrix || !matrix.length) return '<span style="color:var(--muted);font-size:.65rem">No matrix</span>';
  const rows = matrix.length;
  const cols = matrix[0].length;
  const maxVal = Math.max(...matrix.flat());
  let html = '<div class="heatmap" style="grid-template-columns:28px repeat(' + cols + ',28px)">';
  // Header row
  html += '<div class="hm-cell hm-label"></div>';
  for (let c = 0; c < cols; c++) html += '<div class="hm-cell hm-label">' + c + '</div>';
  for (let r = 0; r < rows; r++) {
    html += '<div class="hm-cell hm-label">' + r + '</div>';
    for (let c = 0; c < cols; c++) {
      const v = matrix[r][c];
      const intensity = maxVal > 0 ? v / maxVal : 0;
      const bg = intensity > 0.6 ? `rgba(255,214,0,${0.2 + intensity * 0.8})` :
                 intensity > 0.3 ? `rgba(41,121,255,${0.15 + intensity * 0.7})` :
                 `rgba(85,89,97,${0.1 + intensity * 0.5})`;
      html += `<div class="hm-cell" style="background:${bg}" title="${r}-${c}: ${(v * 100).toFixed(1)}%">${(v * 100).toFixed(0)}</div>`;
    }
  }
  html += '</div>';
  return html;
}

/* --- SPARKLINE --- */
function drawSparkline(canvas, values, color) {
  const { ctx, w, h } = setupCanvas(canvas);
  if (!values || values.length < 2) return;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  ctx.strokeStyle = color || '#2979ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

/* ===================================================================
   ANIMATED COUNTER
   =================================================================== */
function animateCounter(el, target, duration, decimals) {
  duration = duration || 1200;
  decimals = decimals || 0;
  const start = performance.now();
  function frame(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = (target * ease).toFixed(decimals);
    if (p < 1) requestAnimationFrame(frame);
    else el.textContent = target.toFixed(decimals);
  }
  requestAnimationFrame(frame);
}

/* ===================================================================
   INIT
   =================================================================== */
function init() {
  buildHeader();
  buildTicker();
  buildLive();
  buildMarkets();
  buildGroups();
  buildBracket();
  buildPower();
  buildStats();
  buildAccuracy();
  setupTabs();
  // Trigger animations for default tab
  triggerAnimations('live');
}

   HEADER

function buildHeader() {
  const meta = document.getElementById('header-meta');
  const s = DATA.stats || {};
  const winner = s.most_common_winner || '—';
  const winPct = s.most_common_winner_pct ? pct(s.most_common_winner_pct) : '';
  const sims = s.simulations || 0;
  meta.innerHTML = `
    <span>DATE <span class="val">${DATA.today || DATA.generated_date || '—'}</span></span>
    &nbsp;│&nbsp;
    <span>SIMS <span class="val">${sims.toLocaleString()}</span></span>
    &nbsp;│&nbsp;
    <span>FAVOURITE <span class="val">${getFlag(winner)} ${winner} ${winPct}</span></span>
  `;
}

/* ===================================================================
   TICKER
   =================================================================== */
function buildTicker() {
  const wrap = document.getElementById('ticker-wrap');
  const matches = DATA.todays_matches || [];
  if (!matches.length) { wrap.style.display = 'none'; return; }

  let items = '';
  matches.forEach(m => {

    const cls = maxP > 0.6 ? 'high' : maxP > 0.4 ? 'med' : 'low';

      <span style="color:${getMatchStatusColor(m)}">${getMatchStatusText(m)}</span>
      <span style="color:var(--text)">${scoreA != null ? scoreA : '?'}-${scoreB != null ? scoreB : '?'}</span>
      <span class="prob ${cls}">${pct0(m.prob_win_a)}</span>
      <span style="color:var(--muted)">/</span>
      <span class="prob med">${pct0(m.prob_draw)}</span>
      <span style="color:var(--muted)">/</span>
      <span class="prob ${m.prob_win_b > 0.4 ? 'high' : m.prob_win_b > 0.2 ? 'med' : 'low'}">${pct0(m.prob_win_b)}</span>

}

    html += '<div style="margin-bottom:6px;font-family:var(--mono);font-size:.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px">● Today\'s Matches</div>';

      const eloB = tp[m.team_b] ? tp[m.team_b].elo : '';

      const statusText = getMatchStatusText(m);
      const statusColor = getMatchStatusColor(m);

      const xgLabel = m.status === 'in_progress' ? `REMAINING XG @ ${m.live_minute || 0}'` : 'EXPECTED GOALS';
      const scoreSubline = m.status === 'in_progress'
        ? `Projected FT: ${m.predicted_score_a} — ${m.predicted_score_b}`
        : (m.status === 'played' ? `Model pre-match: ${m.predicted_score_a} — ${m.predicted_score_b}` : 'Projected final score');
      html += `<div class="match-card">
        <div class="mc-header">
          <span class="group-tag">GRP ${m.group}</span>
          <span>${m.date}</span>
          <span style="color:${statusColor}">● ${statusText}</span>
        </div>
        <div class="mc-teams">
          <div class="mc-team">
            <span class="flag">${getFlag(m.team_a)}</span>
            <span class="name">${m.team_a}</span>
             <span class="rating">${eloA ? 'ELO ' + Math.round(eloA) : ''}</span>
          </div>
          <div class="mc-score">
            <span>${displayScoreA != null ? displayScoreA : '?'}</span>
            <span class="sep">—</span>
            <span>${displayScoreB != null ? displayScoreB : '?'}</span>
          </div>
          <div class="mc-team">
            <span class="flag">${getFlag(m.team_b)}</span>
            <span class="name">${m.team_b}</span>
            <span class="rating">${eloB ? 'ELO ' + Math.round(eloB) : ''}</span>
          </div>
        </div>
        <div style="text-align:center;font-family:var(--mono);font-size:.65rem;color:${m.status === 'in_progress' ? 'var(--red)' : 'var(--text2)'}">${scoreSubline}</div>
        <div class="prob-bar">
          <div class="seg win" style="width:0%" data-target="${m.prob_win_a * 100}">${pct0(m.prob_win_a)}</div>
          <div class="seg draw" style="width:0%" data-target="${m.prob_draw * 100}">${pct0(m.prob_draw)}</div>
          <div class="seg lose" style="width:0%" data-target="${m.prob_win_b * 100}">${pct0(m.prob_win_b)}</div>
        </div>
        <div class="odds-row">
          <span class="odd ${m.odds_a === minOdd ? 'fav' : ''}">${m.odds_a ? dec(m.odds_a) : '—'}</span>
          <span class="odd ${m.odds_draw === minOdd ? 'fav' : ''}">${m.odds_draw ? dec(m.odds_draw) : '—'}</span>
          <span class="odd ${m.odds_b === minOdd ? 'fav' : ''}">${m.odds_b ? dec(m.odds_b) : '—'}</span>
        </div>
        <div style="text-align:center;font-family:var(--mono);font-size:.6rem;color:var(--muted)">${xgLabel}</div>
        <div class="xg-bar">
          <span class="xg-val">${xgA != null ? xgA.toFixed(2) : '—'}</span>
          <div class="xg-track">
            <div class="xg-fill-a" style="width:0%" data-target="${xgA != null && xgB != null && (xgA + xgB) > 0 ? (xgA / (xgA + xgB) * 100) : 50}"></div>
            <div class="xg-fill-b" style="width:0%" data-target="${xgA != null && xgB != null && (xgA + xgB) > 0 ? (xgB / (xgA + xgB) * 100) : 50}"></div>
          </div>
          <span class="xg-val">${xgB != null ? xgB.toFixed(2) : '—'}</span>
        </div>
        <div style="text-align:center">
          <div style="font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-bottom:2px">SCORE PROBABILITY MATRIX (A rows × B cols)</div>
          ${drawHeatmapHTML(m.score_matrix)}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  // Upcoming
  if (upcoming.length) {
    html += '<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--blue)"></span>Upcoming Matches</div><div class="panel-body">';
    const nextDay = upcoming.length > 0 ? upcoming[0].date : '';
    const nextMatches = upcoming.filter(m => m.date === nextDay);
    const laterMatches = upcoming.filter(m => m.date !== nextDay).slice(0, 16);

    if (nextMatches.length) {
      html += `<div style="font-family:var(--mono);font-size:.65rem;color:var(--cyan);margin-bottom:4px">NEXT MATCHDAY — ${nextDay}</div>`;
      nextMatches.forEach(m => {
        html += `<div class="upcoming-row">
          <span class="ur-date">${m.date}</span>
          <span class="ur-team right">${getFlag(m.team_a)} ${m.team_a}</span>
          <span class="ur-vs">${m.predicted_score_a} — ${m.predicted_score_b}</span>
          <span class="ur-team">${m.team_b} ${getFlag(m.team_b)}</span>
          <span class="ur-group">GRP ${m.group}</span>
        </div>`;
      });

    if (laterMatches.length) {
      html += `<div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);margin:8px 0 4px">LATER</div>`;
      laterMatches.forEach(m => {
        html += `<div class="upcoming-row">
          <span class="ur-date">${m.date}</span>
          <span class="ur-team right">${getFlag(m.team_a)} ${m.team_a}</span>
          <span class="ur-vs">${m.predicted_score_a} — ${m.predicted_score_b}</span>
          <span class="ur-team">${m.team_b} ${getFlag(m.team_b)}</span>
          <span class="ur-group">GRP ${m.group}</span>
        </div>`;
      });
    }

    html += '</div></div>';
  }

  el.innerHTML = html;
}

/* ===================================================================
   TAB: MARKETS
   =================================================================== */
function buildMarkets() {
  const el = document.getElementById('tab-markets');
  const pt = DATA.probability_timeline || {};
  const pr = DATA.power_rankings || [];
  const teams = Object.keys(pt);

  let html = '';

  // --- Win probability line chart ---
  html += '<div class="panel" style="margin-bottom:10px"><div class="panel-title"><span class="dot"></span>Tournament Win Probability — Timeline</div><div class="panel-body">';
  if (teams.length && pt[teams[0]] && pt[teams[0]].length > 0) {
    // Get top 8 by final win_pct
    const sorted = [...teams].sort((a, b) => {
      const vA = pt[a][pt[a].length - 1].win_pct;
      const vB = pt[b][pt[b].length - 1].win_pct;
      return vB - vA;
    });
    const top8 = sorted.slice(0, 8);
    const labels = pt[top8[0]].map(d => d.matchday.toUpperCase());

    html += '<canvas id="chart-timeline" style="height:320px;margin-bottom:8px"></canvas>';
    html += '<div id="legend-timeline" style="display:flex;flex-wrap:wrap;gap:8px;font-family:var(--mono);font-size:.65rem"></div>';

    // Store data for post-render
    el._timelineData = { top8, labels, pt };
  } else {
    html += '<div style="color:var(--muted);padding:40px;text-align:center;font-family:var(--mono)">No timeline data available yet. Check back after matchday 1.</div>';
  }
  html += '</div></div>';

  // --- Volatility panel ---
  html += '<div class="grid-2" style="margin-bottom:10px">';
  html += '<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--cyan)"></span>Volatility — Biggest Movers</div><div class="panel-body">';

  if (teams.length && pt[teams[0]] && pt[teams[0]].length >= 2) {
    const changes = teams.map(t => {
      const entries = pt[t];
      const pre = entries[0].win_pct;
      const latest = entries[entries.length - 1].win_pct;
      return { team: t, change: latest - pre };
    }).filter(d => Math.abs(d.change) > 0.0001).sort((a, b) => Math.abs(b.change) - Math.abs(a.change)).slice(0, 12);

    html += '<canvas id="chart-volatility" style="height:280px"></canvas>';
    el._volatilityData = changes;
  } else {
    html += '<div style="color:var(--muted);padding:20px;text-align:center;font-family:var(--mono)">Needs 2+ matchdays</div>';
  }
  html += '</div></div>';

  // --- Win probability bar chart ---
  html += '<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--gold)"></span>Win Probability — Top 15</div><div class="panel-body">';
  html += '<canvas id="chart-winprob" style="height:380px"></canvas>';
  html += '</div></div>';
  html += '</div>'; // close grid-2

  el.innerHTML = html;
}

/* ===================================================================
   TAB: BRACKET
   =================================================================== */
function buildBracket() {
  const el = document.getElementById('tab-bracket');
  const kb = DATA.knockout_bracket || {};
  const stats = DATA.stats || {};

  const rounds = ['r32', 'r16', 'qf', 'sf', 'final'];
  const roundNames = { r32: 'Round of 32', r16: 'Round of 16', qf: 'Quarter-Finals', sf: 'Semi-Finals', final: 'Final' };

  let html = '<div style="display:flex;gap:2px;overflow-x:auto;padding:8px 0;align-items:stretch">';

  rounds.forEach((rKey, ri) => {
    const matchups = kb[rKey];
    if (!matchups) return;
    const isSingle = !Array.isArray(matchups);
    const list = isSingle ? [matchups] : matchups;

    html += `<div style="display:flex;flex-direction:column;min-width:200px">
      <div style="font-family:var(--mono);font-size:.65rem;color:var(--cyan);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);margin-bottom:4px">${roundNames[rKey] || rKey}</div>
      <div style="display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:2px">`;

    list.forEach(m => {
      const aWin = m.prob_a >= m.prob_b;
      const confA = m.prob_a;
      const confB = m.prob_b;
      const borderColor = Math.max(confA, confB) > 0.7 ? 'var(--green)' : Math.max(confA, confB) > 0.55 ? 'var(--yellow)' : 'var(--muted)';

      html += `<div class="bracket-matchup" style="border-left:3px solid ${borderColor}">
        <div class="bm-team ${aWin ? 'winner' : ''}">
          <span>${getFlag(m.team_a)} ${m.team_a}</span>
          <span class="prob">${pct0(confA)}</span>
        </div>
        <div class="bm-team ${!aWin ? 'winner' : ''}">
          <span>${getFlag(m.team_b)} ${m.team_b}</span>
          <span class="prob">${pct0(confB)}</span>
        </div>
      </div>`;
    });

    html += '</div></div>';

    // Connector
    if (ri < rounds.length - 1) {
      html += '<div class="bracket-connector"></div>';
    }
  });

  html += '</div>';

  // Champion / Final stats
  html += '<div class="grid-2" style="margin-top:12px">';

  // Most Common Final
  if (stats.most_common_final) {
    const [fA, fB] = stats.most_common_final;
    html += `<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--gold)"></span>Most Common Final</div><div class="panel-body" style="text-align:center">
      <div style="font-size:2rem;margin:8px 0">${getFlag(fA)} <span style="font-family:var(--mono);font-weight:700;font-size:1.2rem">${fA}</span> <span style="color:var(--muted);font-family:var(--mono)">vs</span> <span style="font-family:var(--mono);font-weight:700;font-size:1.2rem">${fB}</span> ${getFlag(fB)}</div>
      <div style="font-family:var(--mono);font-size:.8rem;color:var(--text2)">${stats.most_common_final_pct ? pct(stats.most_common_final_pct) : ''} of simulations</div>
    </div></div>`;
  }

  // Champion
  if (stats.most_common_winner) {
    html += `<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--gold)"></span>Most Likely Champion</div><div class="panel-body" style="text-align:center">
      <div style="font-size:3rem;margin:8px 0">${getFlag(stats.most_common_winner)}</div>
      <div style="font-family:var(--mono);font-weight:700;font-size:1.4rem;color:var(--gold)">${stats.most_common_winner}</div>
      <div style="font-family:var(--mono);font-size:.9rem;color:var(--text2);margin-top:4px">${stats.most_common_winner_pct ? pct(stats.most_common_winner_pct) : ''} win probability</div>
    </div></div>`;
  }

  html += '</div>';

  el.innerHTML = html;
}

      html += '<dt>Features</dt><dd>';

        html += `<div style="padding:1px 0;color:var(--text2)">• ${f}</div>`;

    html += '</dl>';
  } else {
    html += '<div style="color:var(--muted);font-family:var(--mono)">No model info available</div>';
  }
  html += '</div></div>';

  html += '</div>'; // close grid-2

  el.innerHTML = html;
}

/* ===================================================================
   TAB: ACCURACY
   =================================================================== */
function buildAccuracy() {
  const el = document.getElementById('tab-accuracy');
  const log = DATA.prediction_log || [];
  const cal = DATA.calibration_data || [];
  const metrics = DATA.accuracy_metrics || {};

  if (!log.length) {
    el.innerHTML = '<div class="panel"><div class="panel-body" style="text-align:center;color:var(--muted);padding:40px;font-family:var(--mono)">No prediction data yet. Accuracy tracking starts after the first match result is processed through --update.</div></div>';
    return;
  }

  let html = '';

  // KPIs
  const total = log.length;
  const correct = log.filter(e => e.result_category === 'exact_score' || e.result_category === 'correct_direction').length;
  const avgBrier = log.reduce((s, e) => s + (e.brier_score || 0), 0) / total;

  html += '<div class="kpi-grid" style="margin-bottom:12px">';
  html += '<div class="kpi"><div class="kpi-val" data-counter="' + total + '" data-decimals="0">0</div><div class="kpi-label">Predictions Evaluated</div></div>';
  html += '<div class="kpi"><div class="kpi-val" data-counter="' + (correct/total*100).toFixed(1) + '" data-decimals="1">0</div><div class="kpi-label">Correct Direction %</div></div>';
  html += '<div class="kpi"><div class="kpi-val" data-counter="' + avgBrier.toFixed(4) + '" data-decimals="4">0</div><div class="kpi-label">Avg Brier Score</div></div>';

  // Brier quality label
  const brierLabel = avgBrier < 0.1 ? 'Excellent' : avgBrier < 0.2 ? 'Good' : avgBrier < 0.3 ? 'Average' : 'Poor';
  const brierColor = avgBrier < 0.15 ? 'var(--green)' : avgBrier < 0.25 ? 'var(--yellow)' : 'var(--red)';
  html += '<div class="kpi"><div class="kpi-val" style="font-size:1.2rem;color:' + brierColor + '">' + brierLabel + '</div><div class="kpi-label">Model Quality</div></div>';
  html += '</div>';

  // Calibration chart
  if (cal.length) {
    html += '<div class="panel" style="margin-bottom:10px"><div class="panel-title"><span class="dot" style="background:var(--cyan)"></span>Calibration — Predicted vs Actual</div><div class="panel-body">';
    html += '<canvas id="chart-calibration" style="height:280px"></canvas>';
    html += '<div style="font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-top:4px">Perfect calibration = bars match the diagonal. If predicted 70% events happen 70% of the time, the model is well-calibrated.</div>';
    html += '</div></div>';
    el._calibrationData = cal;
  }

  // Model vs Market (if available)
  const matchPreds = DATA.match_predictions || [];
  const withMarket = log.filter(e => matchPreds.find(m => m.team_a === e.team_a && m.team_b === e.team_b && m.market_prob_a != null));
  if (withMarket.length > 0) {
    html += '<div class="panel" style="margin-bottom:10px"><div class="panel-title"><span class="dot" style="background:var(--gold)"></span>Model vs Market</div><div class="panel-body">';
    html += '<table class="data-table"><thead><tr><th>Match</th><th>Model Win%</th><th>Market Win%</th><th>Edge</th><th>Result</th></tr></thead><tbody>';
    for (const entry of withMarket) {
      const match = matchPreds.find(m => m.team_a === entry.team_a && m.team_b === entry.team_b);
      if (!match || match.market_prob_a == null) continue;
      const modelP = entry.prob_win_a;
      const marketP = match.market_prob_a;
      const edge = ((modelP - marketP) * 100).toFixed(1);
      const edgeColor = Math.abs(edge) > 5 ? (edge > 0 ? 'var(--green)' : 'var(--red)') : 'var(--text2)';
      const sa = entry.actual_score_a; const sb = entry.actual_score_b;
      html += '<tr>' +
        '<td>' + getFlag(entry.team_a) + ' ' + entry.team_a + ' vs ' + entry.team_b + ' ' + getFlag(entry.team_b) + '</td>' +
        '<td>' + pct(modelP) + '</td>' +
        '<td>' + pct(marketP) + '</td>' +
        '<td style="color:' + edgeColor + '">' + (edge > 0 ? '+' : '') + edge + '%</td>' +
        '<td>' + sa + '-' + sb + '</td>' +
      '</tr>';
    }
    html += '</tbody></table></div></div>';
  }

  // Full prediction log table
  html += '<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--green)"></span>Prediction Log — Full History</div><div class="panel-body" style="overflow-x:auto">';
  html += '<table class="data-table"><thead><tr>';
  html += '<th>Date</th><th>Match</th><th>Predicted</th><th>Actual</th><th>Win%</th><th>Draw%</th><th>Loss%</th><th>Brier</th><th>Result</th>';
  html += '</tr></thead><tbody>';

  for (const e of log) {
    const bScore = e.brier_score || 0;
    const brierC = bScore < 0.1 ? 'var(--green)' : bScore < 0.25 ? 'var(--yellow)' : 'var(--red)';
    const resultC = e.result_category === 'exact_score' ? 'var(--gold)' : e.result_category === 'correct_direction' ? 'var(--green)' : 'var(--red)';
    const resultLabel = e.result_category === 'exact_score' ? 'EXACT' : e.result_category === 'correct_direction' ? 'OK' : 'MISS';
    html += '<tr>' +
      '<td>' + (e.date || '') + '</td>' +
      '<td>' + getFlag(e.team_a) + ' ' + e.team_a + ' vs ' + e.team_b + ' ' + getFlag(e.team_b) + '</td>' +
      '<td style="text-align:center">' + e.predicted_score_a + '-' + e.predicted_score_b + '</td>' +
      '<td style="text-align:center;color:var(--gold)">' + e.actual_score_a + '-' + e.actual_score_b + '</td>' +
      '<td>' + pct(e.prob_win_a) + '</td>' +
      '<td>' + pct(e.prob_draw) + '</td>' +
      '<td>' + pct(e.prob_win_b) + '</td>' +
      '<td style="color:' + brierC + '">' + bScore.toFixed(4) + '</td>' +
      '<td style="color:' + resultC + ';font-weight:700">' + resultLabel + '</td>' +
    '</tr>';
  }

  html += '</tbody></table></div></div>';

  el.innerHTML = html;
}

/* ===================================================================
   TABLE SORTING
   =================================================================== */
function setupTableSorting(tableId, data) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const headers = table.querySelectorAll('th');
  let sortCol = 'winner';
  let sortDir = 'desc';

  headers.forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (!col) return;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = col === 'team' ? 'asc' : 'desc';
      }
      headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      sortAndRender();
    });
  });

  function sortAndRender() {
    const sorted = [...data].sort((a, b) => {
      let vA = a[sortCol], vB = b[sortCol];
      if (sortCol === 'team') {
        return sortDir === 'asc' ? vA.localeCompare(vB) : vB.localeCompare(vA);
      }
      vA = Number(vA) || 0;
      vB = Number(vB) || 0;
      return sortDir === 'asc' ? vA - vB : vB - vA;
    });

    const maxWin = Math.max(...sorted.map(t => t.winner));
    const tbody = table.querySelector('tbody');
    tbody.innerHTML = '';
    sorted.forEach((t, i) => {
      const barW = maxWin > 0 ? (t.winner / maxWin * 80) : 0;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:var(--muted)">${i + 1}</td>
        <td><div class="team-cell"><span class="flag">${getFlag(t.team)}</span>${t.team}</div></td>
        <td>${Math.round(t.elo)}</td>
        <td style="color:${t.form > 0 ? 'var(--green)' : t.form < 0 ? 'var(--red)' : 'var(--text2)'}">${t.form > 0 ? '▲' : t.form < 0 ? '▼' : '—'} ${Math.abs(t.form).toFixed(2)}</td>
        <td>${pct(t.group_stage)}</td>
        <td>${pct(t.r16)}</td>
        <td>${pct(t.qf)}</td>
        <td>${pct(t.sf)}</td>
        <td>${pct(t.final)}</td>
        <td><span class="mini-bar" style="width:${barW}px"></span> ${pct(t.winner)}</td>`;
      tbody.appendChild(tr);
    });
  }
}

/* ===================================================================
   TAB SYSTEM
   =================================================================== */
function setupTabs() {
  const btns = document.querySelectorAll('.tab-btn');
  const contents = document.querySelectorAll('.tab-content');

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      contents.forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('tab-' + tab).classList.add('active');
      triggerAnimations(tab);
    });
  });
}

/* ===================================================================
   ANIMATION TRIGGERS
   =================================================================== */
function triggerAnimations(tab) {
  // Probability bars
  requestAnimationFrame(() => {
    document.querySelectorAll('#tab-' + tab + ' .prob-bar .seg').forEach(seg => {
      const target = seg.dataset.target;
      if (target) { seg.style.width = '0%'; requestAnimationFrame(() => { seg.style.width = target + '%'; }); }
    });

    // xG fills
    document.querySelectorAll('#tab-' + tab + ' .xg-fill-a, #tab-' + tab + ' .xg-fill-b').forEach(fill => {
      const target = fill.dataset.target;
      if (target) { fill.style.width = '0%'; requestAnimationFrame(() => { fill.style.width = target + '%'; }); }
    });

    // Qualify bars
    document.querySelectorAll('#tab-' + tab + ' .q-bar').forEach(bar => {
      const target = bar.dataset.target;
      if (target) { bar.style.width = '0%'; requestAnimationFrame(() => { bar.style.width = target + '%'; }); }
    });

    // Mini bars
    document.querySelectorAll('#tab-' + tab + ' .mini-bar').forEach(bar => {
      const target = bar.dataset.target;
      if (target) { bar.style.width = '0px'; requestAnimationFrame(() => { bar.style.width = target + 'px'; }); }
    });

    // KPI counters
    document.querySelectorAll('#tab-' + tab + ' [data-counter]').forEach(el => {
      const val = parseFloat(el.dataset.counter);
      const dec = parseInt(el.dataset.decimals) || 0;
      animateCounter(el, val, 1200, dec);
    });
  });

  // Canvas charts (deferred)
  setTimeout(() => renderCharts(tab), 50);
}

/* ===================================================================
   CHART RENDERING
   =================================================================== */
function renderCharts(tab) {
  const pr = DATA.power_rankings || [];
  const marketsEl = document.getElementById('tab-markets');

  if (tab === 'markets') {
    // Timeline chart
    if (marketsEl._timelineData) {
      const { top8, labels, pt } = marketsEl._timelineData;
      const canvas = document.getElementById('chart-timeline');
      if (canvas) {
        const datasets = top8.map((team, i) => ({
          label: team,
          values: pt[team].map(d => d.win_pct),
          color: CHART_COLORS[i % CHART_COLORS.length]
        }));
        const maxY = Math.max(...datasets.flatMap(d => d.values)) * 1.2;
        drawLineChart(canvas, datasets, { labels, yMin: 0, yMax: maxY });

        // Legend
        const legendEl = document.getElementById('legend-timeline');
        if (legendEl) {
          legendEl.innerHTML = top8.map((t, i) => `<span style="color:${CHART_COLORS[i % CHART_COLORS.length]}">${getFlag(t)} ${t}</span>`).join('');
        }
      }
    }

    // Volatility chart
    if (marketsEl._volatilityData) {
      const canvas = document.getElementById('chart-volatility');
      if (canvas) {
        const changes = marketsEl._volatilityData;
        const items = changes.map(d => ({
          label: d.team,
          value: Math.abs(d.change),
          flag: getFlag(d.team),
          color: d.change >= 0 ? '#00c853' : '#ff1744'
        }));
        drawHBarChart(canvas, items, {
          labelWidth: 110,
          maxVal: Math.max(...items.map(d => d.value)),
          format: v => (v >= 0 ? '+' : '') + pct(v)
        });
      }
    }

    // Win probability bar
    const canvasWin = document.getElementById('chart-winprob');
    if (canvasWin && pr.length) {
      const top15 = [...pr].slice(0, 15);
      const items = top15.map(t => ({
        label: t.team,
        value: t.winner,
        flag: getFlag(t.team),
        color: '#ffd600'
      }));
      drawHBarChart(canvasWin, items, {
        labelWidth: 120,
        maxVal: Math.max(...items.map(d => d.value)),
        format: pct
      });
    }
  }

  if (tab === 'accuracy') {
    const accEl = document.getElementById('tab-accuracy');
    if (accEl && accEl._calibrationData) {
      const canvas = document.getElementById('chart-calibration');
      if (canvas) {
        const cal = accEl._calibrationData;
        const items = cal.map(b => ({
          label: b.bucket,
          value: b.actual_rate,
          flag: '',
          color: '#00e5ff'
        }));
        drawHBarChart(canvas, items, {
          labelWidth: 70,
          maxVal: 1.0,
          barColor: '#00e5ff',
          format: v => pct(v)
        });
      }
    }
  }

  if (tab === 'power') {
    // ELO distribution
    const canvasElo = document.getElementById('chart-elo');
    if (canvasElo && pr.length) {
      const sorted = [...pr].sort((a, b) => b.elo - a.elo);
      const confColors = {
        'UEFA': '#2979ff', 'CONMEBOL': '#00c853', 'CONCACAF': '#ff6d00',
        'AFC': '#e040fb', 'CAF': '#ffd600', 'OFC': '#00e5ff'
      };
      const items = sorted.map(t => ({
        label: t.team,
        value: t.elo,
        flag: getFlag(t.team),
        color: '#2979ff'
      }));
      drawHBarChart(canvasElo, items, {
        labelWidth: 120,
        maxVal: Math.max(...items.map(d => d.value)),
        barColor: '#2979ff',
        format: v => Math.round(v).toString()
      });
    }

    // Win distribution
    const canvasWinDist = document.getElementById('chart-windist');
    if (canvasWinDist && pr.length) {
      const top15 = [...pr].slice(0, 15);
      const items = top15.map(t => ({
        label: t.team,
        value: t.winner,
        flag: getFlag(t.team),
        color: '#ffd600'
      }));
      drawHBarChart(canvasWinDist, items, {
        labelWidth: 120,
        maxVal: Math.max(...items.map(d => d.value)),
        format: pct
      });
    }
  }
}

/* ===================================================================
   RESPONSIVE CHART RESIZE
   =================================================================== */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab) renderCharts(activeTab.dataset.tab);
  }, 200);
});

/* ===================================================================
   BOOT
   =================================================================== */
loadData();
</script>
